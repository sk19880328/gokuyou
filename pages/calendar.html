<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #FF6B35;
    --primary-light: #FF8C5A;
    --primary-bg: #FFF4EF;
    --accent: #2D6BE4;
    --green: #27AE60;
    --green-bg: #EDFBF4;
    --white: #FFFFFF;
    --bg: #F7F8FA;
    --card: #FFFFFF;
    --charcoal: #3d3d3d;
    --text: #3d3d3d;
    --text2: #666677;
    --text3: #9999AA;
    --border: rgba(61,61,61,0.12);
    --error: #D14343;
    --error-bg: #FDECEC;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 24px 16px 80px;
  }

  .cal-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text3);
    text-decoration: none;
    margin-bottom: 12px;
  }

  .cal-back:hover { color: var(--primary); }

  .cal-top-nav {
    display: flex;
    gap: 14px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .cal-top-nav a {
    font-size: 12px;
    color: var(--text3);
    text-decoration: none;
  }

  .cal-top-nav a:hover { color: var(--primary); }

  .cal-eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--primary);
    margin-bottom: 8px;
    font-weight: 700;
  }

  .cal-title {
    font-size: 24px;
    font-weight: 800;
    color: var(--charcoal);
    line-height: 1.3;
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }

  .cal-desc {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.7;
    margin-bottom: 20px;
  }

  /* Filter */
  .cal-filter {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .cal-filter-btn {
    font-size: 11px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--text2);
    cursor: pointer;
    font-family: inherit;
    line-height: 1.4;
  }

  .cal-filter-btn.active {
    border-color: var(--primary);
    color: var(--primary);
    background: var(--primary-bg);
  }

  .cal-filter-select {
    font-size: 12px;
    padding: 6px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--white);
    color: var(--text2);
    font-family: inherit;
    cursor: pointer;
  }

  .cal-filter-select:focus {
    outline: none;
    border-color: var(--primary);
  }

  /* Register button */
  .cal-register-btn {
    width: 100%;
    padding: 13px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.03em;
    margin-bottom: 20px;
  }

  .cal-register-btn:hover { background: var(--primary-light); }

  /* Register form */
  .cal-form-card {
    background: var(--card);
    border-radius: 16px;
    padding: 22px 18px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 20px rgba(0,0,0,0.04);
    margin-bottom: 20px;
  }

  .cal-form-title {
    font-size: 14px;
    font-weight: 800;
    color: var(--charcoal);
    margin-bottom: 16px;
  }

  .cal-field {
    margin-bottom: 14px;
  }

  .cal-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    letter-spacing: 0.06em;
    margin-bottom: 4px;
    display: block;
  }

  .cal-input,
  .cal-select,
  .cal-textarea {
    width: 100%;
    padding: 11px 13px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    font-size: 13px;
    color: var(--text);
    font-family: inherit;
  }

  .cal-input:focus,
  .cal-select:focus,
  .cal-textarea:focus {
    outline: none;
    border-color: var(--primary);
    background: var(--white);
  }

  .cal-textarea {
    resize: vertical;
    min-height: 70px;
  }

  .cal-form-btn-row {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  .cal-submit-btn {
    flex: 1;
    padding: 12px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }

  .cal-submit-btn:hover:not(:disabled) { background: var(--primary-light); }
  .cal-submit-btn:disabled { background: var(--text3); cursor: not-allowed; }

  .cal-cancel-btn {
    padding: 12px 18px;
    background: var(--bg);
    color: var(--text2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }

  .cal-form-error {
    background: var(--error-bg);
    color: var(--error);
    padding: 10px 13px;
    border-radius: 8px;
    font-size: 12px;
    margin-top: 10px;
  }

  /* Auth notice */
  .cal-auth-notice {
    background: var(--primary-bg);
    color: var(--primary);
    padding: 13px 16px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .cal-auth-notice a {
    color: var(--primary);
    font-weight: 700;
  }

  /* Month group */
  .cal-month {
    margin-bottom: 28px;
  }

  .cal-month-label {
    font-size: 12px;
    font-weight: 800;
    color: var(--text3);
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* Event card */
  .cal-event {
    background: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    margin-bottom: 10px;

  .cal-event-header {

  .cal-event-date {

    font-weight: 700;
    color: var(--primary);
    min-width: 70px;
  }

  .cal-event-badges {

    gap: 4px;
    flex-wrap: wrap;

  .cal-badge {
    font-size: 10px;
    font-weight: 700;

    border-radius: 4px;
    white-space: nowrap;

  .cal-badge-entertainment { background: #FFF0E8; color: #E86835; }
  .cal-badge-creative { background: #F0E8FF; color: #8C35E8; }
  .cal-badge-sports { background: #E8F4FF; color: #357CE8; }
  .cal-badge-study { background: #E8FFF0; color: #27AE60; }
  .cal-badge-business { background: #FFF8E8; color: #C89A00; }
  .cal-badge-others { background: #F0F0F0; color: #666677; }
  .cal-badge-default { background: #F0F0F0; color: #666677; }

  .cal-badge-status-挑戦中 { background: var(--primary-bg); color: var(--primary); }
  .cal-badge-status-諦めた { background: #F0F0F0; color: #666677; }
  .cal-badge-status-探し中 { background: #E8F4FF; color: #357CE8; }

  .cal-event-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 4px;
  }

  .cal-event-desc {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 6px;
  }

  .cal-event-author {
    font-size: 11px;
    color: var(--text3);
  }

  /* Loading/empty state */
  .cal-loading,
  .cal-empty {
    text-align: center;
    padding: 40px 0;
    color: var(--text3);
    font-size: 13px;
    line-height: 1.8;
  }

  /* Tab UI */
  .cal-tabs {
    display: flex;
    background: var(--white);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
    gap: 4px;
  }

  .cal-tab-btn {
    flex: 1;
    padding: 9px 8px;
    border: none;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    background: transparent;
    color: var(--text3);
    letter-spacing: 0.02em;
    line-height: 1.3;
  }

  .cal-tab-btn.active {
    background: var(--primary);
    color: #fff;
    box-shadow: 0 2px 8px rgba(255,107,53,0.3);
  }

  .cal-tab-pane { display: none; }
  .cal-tab-pane.active { display: block; }

  /* My calendar grid */
  .my-cal-wrap {
    background: var(--white);
    border-radius: 14px;
    padding: 20px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    margin-bottom: 20px;
  }

  .my-cal-month-label {
    font-size: 13px;
    color: var(--text2);
    font-weight: 600;
    margin-bottom: 14px;
    letter-spacing: 0.05em;
  }

  .my-cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 14px;
  }

  .my-cal-day-label {
    text-align: center;
    font-size: 10px;
    color: var(--text3);
    padding: 4px 0;
    font-weight: 600;
  }

  .my-cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--text2);
    border-radius: 8px;
  }

  .my-cal-day.has-event { background: var(--primary-bg); color: var(--primary); font-weight: 700; }
  .my-cal-day.is-today { background: var(--primary); color: #fff; font-weight: 800; }
  .my-cal-day.is-memorial { background: #EEF3FD; color: #2D6BE4; font-weight: 700; }
  .my-cal-day.empty { opacity: 0; }

  .my-cal-legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }

  .my-legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--text3);
  }

  .my-legend-dot {
    width: 8px; height: 8px;
    border-radius: 3px;
  }

  .dot-log { background: var(--primary-bg); border: 1.5px solid var(--primary); }
  .dot-today { background: var(--primary); }
  .dot-memorial { background: #EEF3FD; border: 1.5px solid #2D6BE4; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    padding: 8px 0 18px;
    z-index: 100;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px;
    cursor: pointer;
    text-decoration: none;
  }

  .nav-icon { font-size: 20px; line-height: 1; }
  .nav-label { font-size: 9px; letter-spacing: 0.03em; color: var(--text3); font-weight: 600; }
  .nav-item.active .nav-label { color: var(--primary); }
</style>
</head>

<script>
var currentSession = null;
var allEvents = [];
var activeGenre = 'all';
var activeStatus = 'all';
var activeTab = 'event';

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-event').classList.toggle('active', tab === 'event');
  document.getElementById('tab-my').classList.toggle('active', tab === 'my');
  document.getElementById('tab-event-btn').classList.toggle('active', tab === 'event');
  document.getElementById('tab-my-btn').classList.toggle('active', tab === 'my');
  if (tab === 'my') renderMyCalendar();
}

function renderMyCalendar() {
  var now = new Date();
  var year = now.getFullYear();
  var month = now.getMonth();
  var today = now.getDate();

  document.getElementById('my-cal-month').textContent = year + '年 ' + (month + 1) + '月';

  var logs = JSON.parse(localStorage.getItem('gokuyou_logs') || '[]');
  var memorials = JSON.parse(localStorage.getItem('gokuyou_memorials') || '[]');
  var logDates = new Set(logs.map(function(l) { return l.date; }));
  var memorialDates = new Set(memorials.map(function(m) { return m.date; }));

  var grid = document.getElementById('my-cal-grid');
  var labels = Array.from(grid.querySelectorAll('.my-cal-day-label'));
  grid.innerHTML = '';
  labels.forEach(function(l) { grid.appendChild(l); });

  var firstDay = new Date(year, month, 1).getDay();
  var daysInMonth = new Date(year, month + 1, 0).getDate();

  for (var i = 0; i < firstDay; i++) {
    var empty = document.createElement('div');
    empty.className = 'my-cal-day empty';
    grid.appendChild(empty);
  }

  for (var d = 1; d <= daysInMonth; d++) {
    var dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    var el = document.createElement('div');
    var cls = 'my-cal-day';
    if (d === today) cls += ' is-today';
    else if (memorialDates.has(dateStr)) cls += ' is-memorial';
    else if (logDates.has(dateStr)) cls += ' has-event';
    el.className = cls;
    el.textContent = d;
    grid.appendChild(el);
  }

  var preview = document.getElementById('my-log-preview');
  var recent = logs.slice().reverse().slice(0, 5);
  if (!recent.length) {
    preview.innerHTML = '<p style="text-align:center;padding:20px 0;color:var(--text3);font-size:13px;">まだ記録がありません。</p>';
    return;
  }
  var html = '<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">';
  recent.forEach(function(l) {
    html += '<div style="background:var(--white);border-radius:12px;padding:12px 14px;border:1px solid var(--border);">' +
      '<div style="font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:600;">' + escHtml(l.date) + '</div>' +
      '<div style="font-size:13px;color:var(--text);">' + escHtml(l.text) + '</div>' +
      '</div>';
  });
  html += '</div>';
  preview.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', function () {
  if (!window.supabaseClient) {
    document.getElementById('cal-list').innerHTML = '<p class="cal-empty">初期化に失敗しました。ページをリロードしてください。</p>';
    return;
  }

  window.supabaseClient.auth.getSession().then(function (result) {
    currentSession = result && result.data ? result.data.session : null;
    renderRegisterArea();
    loadEvents();
  }).catch(function (e) {
    console.error(e);
    renderRegisterArea();
    loadEvents();
  });

  // Genre filter buttons
  document.querySelectorAll('.cal-filter-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.cal-filter-btn').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      activeGenre = btn.getAttribute('data-genre');
      renderList();
    });
  });

  // Status filter select
  document.getElementById('status-filter').addEventListener('change', function () {
    activeStatus = this.value;
    renderList();
  });
});

function renderRegisterArea() {
  var area = document.getElementById('register-area');
  if (!currentSession) {
    area.innerHTML =
      '<div class="cal-auth-notice">' +
        'イベントを登録するには<a href="/gokuyou/pages/login.html">ログイン</a>が必要です。' +
      '</div>';
    return;
  }

  area.innerHTML =
    '<button class="cal-register-btn" id="toggle-form-btn">＋ イベントを登録する</button>' +
    '<div id="cal-form-wrap" style="display:none;">' +
      '<div class="cal-form-card">' +
        '<p class="cal-form-title">イベントを登録</p>' +
        '<div class="cal-field">' +
          '<label class="cal-label" for="form-title">タイトル</label>' +
          '<input class="cal-input" type="text" id="form-title" placeholder="例: ライブ本番" maxlength="100">' +
        '</div>' +
        '<div class="cal-field">' +
          '<label class="cal-label" for="form-desc">詳細（任意）</label>' +
          '<textarea class="cal-textarea" id="form-desc" placeholder="内容を一言で" maxlength="300"></textarea>' +
        '</div>' +
        '<div class="cal-field">' +
          '<label class="cal-label" for="form-date">日付</label>' +
          '<input class="cal-input" type="date" id="form-date">' +
        '</div>' +
        '<div class="cal-field">' +
          '<label class="cal-label" for="form-genre">ジャンル</label>' +
          '<select class="cal-select" id="form-genre">' +
            '<option value="">選択してください</option>' +
            '<option value="Entertainment">Entertainment｜芸能・お笑い</option>' +
            '<option value="Creative">Creative｜音楽・アート</option>' +
            '<option value="Sports">Sports｜スポーツ</option>' +
            '<option value="Study">Study｜勉強・資格</option>' +
            '<option value="Business">Business｜起業・ビジネス</option>' +
            '<option value="Others">Others｜その他</option>' +
          '</select>' +
        '</div>' +
        '<div class="cal-field">' +
          '<label class="cal-label" for="form-status">ステータス</label>' +
          '<select class="cal-select" id="form-status">' +
            '<option value="">選択してください</option>' +
            '<option value="挑戦中">挑戦中</option>' +
            '<option value="諦めた">諦めた</option>' +
            '<option value="探し中">探し中</option>' +
          '</select>' +
        '</div>' +
        '<div class="cal-form-btn-row">' +
          '<button class="cal-cancel-btn" id="cancel-form-btn">キャンセル</button>' +
          '<button class="cal-submit-btn" id="submit-event-btn">登録する</button>' +
        '</div>' +
        '<div id="form-error" class="cal-form-error" style="display:none;">登録に失敗しました。もう一度お試しください。</div>' +
      '</div>' +
    '</div>';

  document.getElementById('toggle-form-btn').addEventListener('click', function () {
    var wrap = document.getElementById('cal-form-wrap');
    wrap.style.display = wrap.style.display === 'none' ? '' : 'none';
  });

  document.getElementById('cancel-form-btn').addEventListener('click', function () {
    document.getElementById('cal-form-wrap').style.display = 'none';
  });

  document.getElementById('submit-event-btn').addEventListener('click', submitEvent);
}

function submitEvent() {
  if (!currentSession) return;

  var title = document.getElementById('form-title').value.trim();
  var desc = document.getElementById('form-desc').value.trim();
  var date = document.getElementById('form-date').value;
  var genre = document.getElementById('form-genre').value;
  var status = document.getElementById('form-status').value;
  var errorEl = document.getElementById('form-error');
  var submitBtn = document.getElementById('submit-event-btn');

  if (!title || !date || !genre || !status) {
    errorEl.textContent = 'タイトル・日付・ジャンル・ステータスは必須です。';
    errorEl.style.display = '';
    return;
  }

  errorEl.style.display = 'none';
  submitBtn.disabled = true;
  submitBtn.textContent = '登録中…';

  window.supabaseClient
    .from('events')
    .insert({
      user_id: currentSession.user.id,
      title: title,
      description: desc || null,
      event_date: date,
      genre: genre,
      status: status
    })
    .then(function (result) {
      submitBtn.disabled = false;
      submitBtn.textContent = '登録する';
      if (result.error) {
        console.error(result.error);
        errorEl.textContent = '登録に失敗しました。もう一度お試しください。';
        errorEl.style.display = '';
        return;
      }
      document.getElementById('cal-form-wrap').style.display = 'none';
      document.getElementById('form-title').value = '';
      document.getElementById('form-desc').value = '';
      document.getElementById('form-date').value = '';
      document.getElementById('form-genre').value = '';
      document.getElementById('form-status').value = '';
      loadEvents();
    })
    .catch(function (e) {
      console.error(e);
      submitBtn.disabled = false;
      submitBtn.textContent = '登録する';
      errorEl.textContent = '登録に失敗しました。もう一度お試しください。';
      errorEl.style.display = '';
    });
}

function loadEvents() {
  var listEl = document.getElementById('cal-list');
  listEl.innerHTML = '<p class="cal-loading">読み込み中...</p>';

  window.supabaseClient
    .from('events')
    .select('id, title, description, event_date, genre, status, user_id')
    .order('event_date', { ascending: true })
    .then(function (result) {
      if (result.error) {
        console.error(result.error);
        var msg = result.error.message || result.error.code || '';
        var isNoTable = msg.indexOf('42P01') !== -1 || msg.indexOf('does not exist') !== -1 || msg.indexOf('relation') !== -1;
        if (isNoTable) {
          listEl.innerHTML =
            '<div class="cal-empty">eventsテーブルが未作成です。<br>' +
            'Supabase SQL Editorで以下のSQLを実行してください。<br><br>' +
            '<a href="/gokuyou/pages/calendar.html#sql-needed" style="color:var(--primary);font-weight:700;">詳細はコンソールを確認</a></div>';
        } else {
          listEl.innerHTML = '<p class="cal-empty">データの読み込みに失敗しました。<br>しばらくしてから再度お試しください。</p>';
        }
        return;
      }
      allEvents = result.data || [];
      renderList();
    })
    .catch(function (e) {
      console.error(e);
      listEl.innerHTML = '<p class="cal-empty">データの読み込みに失敗しました。<br>しばらくしてから再度お試しください。</p>';
    });
}

function renderList() {
  var listEl = document.getElementById('cal-list');

  var filtered = allEvents.filter(function (ev) {
    if (activeGenre !== 'all' && ev.genre !== activeGenre) return false;
    if (activeStatus !== 'all' && ev.status !== activeStatus) return false;
    return true;
  });

  if (!filtered.length) {
    listEl.innerHTML = '<p class="cal-empty">イベントはまだありません。<br>最初の一件を登録してみましょう。</p>';
    return;
  }

  // Group by month
  var groups = {};
  var order = [];
  filtered.forEach(function (ev) {
    var d = ev.event_date ? ev.event_date.slice(0, 7) : '----';
    if (!groups[d]) { groups[d] = []; order.push(d); }
    groups[d].push(ev);
  });

  var html = '';
  order.forEach(function (month) {
    var label = formatMonth(month);
    html += '<div class="cal-month"><p class="cal-month-label">' + escHtml(label) + '</p>';
    groups[month].forEach(function (ev) {
      html += renderEvent(ev);
    });
    html += '</div>';
  });

  listEl.innerHTML = html;
}

function renderEvent(ev) {
  var genreKey = ev.genre ? ev.genre.toLowerCase() : 'default';
  var genreClass = 'cal-badge-' + genreKey;
  var statusClass = 'cal-badge-status-' + (ev.status || '');
  var dateLabel = ev.event_date ? formatDate(ev.event_date) : '';
  var nickname = '匿名';

  return (
    '<div class="cal-event">' +
      '<div class="cal-event-header">' +
        '<span class="cal-event-date">' + escHtml(dateLabel) + '</span>' +
        '<div class="cal-event-badges">' +
          (ev.genre ? '<span class="cal-badge ' + escHtml(genreClass) + '">' + escHtml(ev.genre) + '</span>' : '') +
          (ev.status ? '<span class="cal-badge ' + escHtml(statusClass) + '">' + escHtml(ev.status) + '</span>' : '') +
        '</div>' +
      '</div>' +
      '<p class="cal-event-title">' + escHtml(ev.title || '') + '</p>' +
      (ev.description ? '<p class="cal-event-desc">' + escHtml(ev.description) + '</p>' : '') +
      '<p class="cal-event-author">by ' + escHtml(nickname) + '</p>' +
    '</div>'
  );
}

function formatMonth(ym) {
  if (!ym || ym === '----') return '日付未定';
  var parts = ym.split('-');
  return parts[0] + '年' + parseInt(parts[1], 10) + '月';
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr + 'T00:00:00');
  var days = ['日', '月', '火', '水', '木', '金', '土'];
  return (d.getMonth() + 1) + '/' + d.getDate() + '(' + days[d.getDay()] + ')';
}

function escHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
