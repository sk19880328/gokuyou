<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="終電アプリ"/>
<title>🚃 終電逃さないアプリ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f5f5f0;min-height:100vh;}
.app{padding:1rem;max-width:480px;margin:0 auto;}
h1{font-size:16px;font-weight:500;color:#333;text-align:center;padding:1rem 0 0.5rem;letter-spacing:0.05em;}
.card{background:#fff;border:0.5px solid #e0e0d8;border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.section-label{font-size:12px;color:#888;margin-bottom:10px;font-weight:500;}
.tabs{display:flex;gap:6px;margin-bottom:1rem;}
.tab{flex:1;padding:9px;font-size:13px;font-weight:500;border:0.5px solid #ddd;border-radius:8px;background:#f0f0ea;color:#888;cursor:pointer;text-align:center;}
.tab.active{background:#fff;color:#333;border-color:#aaa;}
.pane{display:none;}.pane.active{display:block;}
.train-row{display:flex;align-items:center;gap:10px;}
.train-row input[type=time]{flex:1;padding:8px 12px;font-size:15px;border:0.5px solid #ddd;border-radius:8px;background:#f5f5f0;color:#333;}
.small-btn{padding:8px 14px;font-size:13px;border:0.5px solid #ddd;border-radius:8px;background:#f5f5f0;color:#333;cursor:pointer;}
.small-btn:hover{background:#e8e8e2;}
.countdown-big{text-align:center;padding:0.5rem 0;}
.countdown-num{font-size:52px;font-weight:500;line-height:1;color:#222;}
.countdown-label{font-size:13px;color:#888;margin-top:4px;}
.status-msg{text-align:center;font-size:15px;margin-top:10px;padding:10px;border-radius:8px;background:#f5f5f0;color:#333;}
.status-msg.danger{background:#FCEBEB;color:#A32D2D;}
.status-msg.warn{background:#FAEEDA;color:#854F0B;}
.status-msg.ok{background:#EAF3DE;color:#3B6D11;}
.checkin-block{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.checkin-info{flex:1;}
.checkin-status{font-size:13px;color:#888;margin-bottom:4px;}
.stay-time{font-size:32px;font-weight:500;color:#222;line-height:1;}
.stay-since{font-size:12px;color:#aaa;margin-top:3px;}
.checkin-btn{padding:10px 16px;font-size:13px;font-weight:500;border:0.5px solid #ddd;border-radius:8px;background:#f5f5f0;color:#333;cursor:pointer;}
.checkin-btn.active{background:#FCEBEB;color:#A32D2D;border-color:#F09595;}
.shop-row{display:flex;align-items:center;gap:8px;margin-top:12px;}
.shop-icon{font-size:16px;}
.shop-input{flex:1;padding:7px 10px;font-size:14px;border:0.5px solid #ddd;border-radius:8px;background:#f5f5f0;color:#333;}
.shop-input:focus{outline:none;border-color:#aaa;}
.shop-input::placeholder{color:#bbb;}
.shop-history{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.shop-chip{font-size:12px;padding:3px 10px;border-radius:20px;background:#f5f5f0;border:0.5px solid #ddd;color:#666;cursor:pointer;}
.stay-bar-bg{height:6px;background:#f0f0ea;border-radius:4px;overflow:hidden;margin-top:12px;}
.stay-bar-fill{height:6px;border-radius:4px;transition:width 0.5s;background:#378ADD;}
.stay-bar-labels{display:flex;justify-content:space-between;font-size:11px;color:#aaa;margin-top:4px;}
.stay-warn-msg{font-size:12px;padding:6px 10px;border-radius:8px;background:#FAEEDA;color:#854F0B;margin-top:8px;}
.stay-danger-msg{font-size:12px;padding:6px 10px;border-radius:8px;background:#FCEBEB;color:#A32D2D;margin-top:8px;}
.drink-types{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.drink-type-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border:0.5px solid #ddd;border-radius:8px;background:#f5f5f0;cursor:pointer;position:relative;}
.drink-type-btn.has-drinks{border-color:#378ADD;background:#E6F1FB;}
.dt-emoji{font-size:22px;}
.dt-name{font-size:11px;color:#888;}
.dt-count{position:absolute;top:5px;right:7px;font-size:11px;font-weight:500;color:#185FA5;}
.drink-type-btn.has-drinks .dt-name{color:#185FA5;}
.drink-detail{background:#f5f5f0;border-radius:8px;padding:12px;margin-bottom:12px;}
.drink-ctrl{display:flex;align-items:center;gap:12px;}
.drink-ctrl-num{font-size:28px;font-weight:500;color:#222;min-width:50px;text-align:center;}
.d-btn{width:44px;height:44px;font-size:22px;border:0.5px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.d-btn:active{transform:scale(0.95);}
.close-btn{margin-left:auto;font-size:12px;color:#aaa;cursor:pointer;padding:4px 8px;border:none;background:none;}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0 0;}
.total-label{font-size:13px;color:#888;}
.total-num{font-size:22px;font-weight:500;color:#222;}
.drink-summary{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.drink-tag{font-size:12px;padding:3px 10px;border-radius:20px;background:#E6F1FB;color:#185FA5;}
.drink-comment{font-size:13px;color:#888;margin-top:6px;}
.memo-input{width:100%;padding:10px 12px;font-size:14px;border:0.5px solid #ddd;border-radius:8px;background:#f5f5f0;color:#333;resize:none;height:60px;margin-bottom:8px;}
.memo-input:focus{outline:none;}
.memo-input::placeholder{color:#bbb;}
.yara-btn{width:100%;padding:13px;font-size:15px;font-weight:500;border:0.5px solid #F09595;border-radius:8px;background:#FCEBEB;color:#A32D2D;cursor:pointer;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.stat-card{background:#f5f5f0;border-radius:8px;padding:14px;}
.stat-label{font-size:12px;color:#888;margin-bottom:6px;}
.stat-val{font-size:22px;font-weight:500;color:#222;}
.stat-sub{font-size:11px;color:#aaa;margin-top:2px;}
.stat-card.hl{background:#FCEBEB;}
.stat-card.hl .stat-val,.stat-card.hl .stat-label{color:#A32D2D;}
.rank-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid #eee;}
.rank-item:last-child{border-bottom:none;}
.rank-emoji{font-size:18px;width:24px;text-align:center;}
.rank-name{font-size:13px;color:#333;flex:1;}
.rank-bar-wrap{flex:2;height:6px;background:#f0f0ea;border-radius:4px;overflow:hidden;}
.rank-bar{height:6px;border-radius:4px;background:#378ADD;}
.rank-count{font-size:13px;font-weight:500;color:#888;}
.shop-rank-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid #eee;}
.shop-rank-item:last-child{border-bottom:none;}
.shop-rank-name{font-size:13px;color:#333;flex:1;}
.shop-rank-count{font-size:12px;color:#A32D2D;font-weight:500;margin-left:8px;}
.shop-rank-badge{font-size:11px;background:#FCEBEB;color:#A32D2D;padding:2px 7px;border-radius:20px;margin-left:6px;}
.log-item{padding:12px 0;border-bottom:0.5px solid #eee;display:flex;justify-content:space-between;align-items:flex-start;}
.log-item:last-child{border-bottom:none;}
.log-date{font-size:13px;font-weight:500;color:#333;}
.log-shop{font-size:12px;color:#185FA5;margin-top:1px;}
.log-memo{font-size:12px;color:#888;margin-top:2px;}
.log-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.log-tag{font-size:11px;padding:2px 7px;border-radius:20px;background:#E6F1FB;color:#185FA5;}
.log-right{text-align:right;flex-shrink:0;margin-left:12px;}
.log-cups{font-size:12px;color:#888;}
.log-stay{font-size:12px;color:#185FA5;margin-top:1px;}
.log-cost{font-size:13px;font-weight:500;color:#A32D2D;margin-top:2px;}
.log-yara{font-size:11px;background:#FCEBEB;color:#A32D2D;padding:2px 7px;border-radius:20px;display:inline-block;}
.log-empty{font-size:14px;color:#bbb;text-align:center;padding:2rem 0;}
.del-btn{font-size:11px;color:#ccc;cursor:pointer;border:none;background:none;padding:4px;}
.month-label{font-size:15px;font-weight:500;color:#333;margin-bottom:12px;}
#login-screen{position:fixed;inset:0;background:#f5f5f0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;}
.login-card{background:#fff;border:0.5px solid #e0e0d8;border-radius:16px;padding:2rem 1.5rem;text-align:center;max-width:320px;width:90%;box-shadow:0 2px 16px rgba(0,0,0,0.06);}
.login-icon{font-size:36px;margin-bottom:0.75rem;}
.login-title{font-size:18px;font-weight:500;color:#333;margin-bottom:0.4rem;}
.login-sub{font-size:13px;color:#888;margin-bottom:1.5rem;line-height:1.6;}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;font-size:14px;font-weight:500;border:0.5px solid #ddd;border-radius:8px;background:#fff;color:#333;cursor:pointer;transition:background 0.15s;}
.google-btn:hover{background:#f5f5f0;}
.google-btn svg{width:18px;height:18px;flex-shrink:0;}
#user-bar{display:none;align-items:center;gap:8px;padding:8px 1rem 6px;background:#fff;border-bottom:0.5px solid #e8e8e0;margin-bottom:0.5rem;}
#user-photo{width:26px;height:26px;border-radius:50%;object-fit:cover;}
#user-name{font-size:13px;color:#555;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.logout-btn{font-size:12px;color:#888;background:none;border:0.5px solid #ddd;border-radius:6px;padding:4px 10px;cursor:pointer;}
.logout-btn:hover{background:#f5f5f0;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-icon">🚃</div>
    <div class="login-title">終電逃さないアプリ</div>
    <div class="login-sub">Googleアカウントでログインして<br>やらかし記録を始めましょう</div>
    <button class="google-btn" onclick="window.googleLogin()">
      <svg viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
        <path d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Googleでログイン
    </button>
  </div>
</div>

<div class="app">
  <div id="user-bar">
    <img id="user-photo" src="" alt=""/>
    <span id="user-name"></span>
    <button class="logout-btn" onclick="window.googleLogout()">ログアウト</button>
  </div>
  <h1>🚃 終電逃さないアプリ</h1>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('tonight')">今夜</div>
    <div class="tab" onclick="switchTab('monthly')">今月の反省</div>
  </div>

  <div class="pane active" id="pane-tonight">
    <div class="card">
      <div class="section-label">終電の時刻</div>
      <div class="train-row">
        <input type="time" id="trainTime" value="23:30"/>
        <button class="small-btn" onclick="setTrain()">セット</button>
      </div>
    </div>
    <div class="card">
      <div class="countdown-big">
        <div class="countdown-num" id="cdNum">--:--</div>
        <div class="countdown-label" id="cdLabel">終電まで</div>
      </div>
      <div class="status-msg ok" id="statusMsg">まだ大丈夫！でも飲みすぎ注意 🍺</div>
    </div>
    <div class="card">
      <div class="section-label">滞在タイマー</div>
      <div class="checkin-block">
        <div class="checkin-info">
          <div class="checkin-status" id="checkinStatus">まだチェックインしていません</div>
          <div class="stay-time" id="stayTime">0分</div>
          <div class="stay-since" id="staySince"></div>
        </div>
        <button class="checkin-btn" id="checkinBtn" onclick="toggleCheckin()">入店</button>
      </div>
      <div class="shop-row">
        <span class="shop-icon">🏮</span>
        <input class="shop-input" id="shopInput" type="text" placeholder="店名（任意）　例：串カツ田中"/>
      </div>
      <div class="shop-history" id="shopHistory"></div>
      <div class="stay-bar-bg"><div class="stay-bar-fill" id="stayBar" style="width:0%"></div></div>
      <div class="stay-bar-labels"><span>0h</span><span>1h</span><span>2h</span><span>3h+</span></div>
      <div id="stayAlert"></div>
    </div>
    <div class="card">
      <div class="section-label">今夜のお酒（タップして記録）</div>
      <div class="drink-types" id="drinkTypes"></div>
      <div id="drinkDetail"></div>
      <div class="total-row">
        <span class="total-label">合計</span>
        <span class="total-num"><span id="totalDrinks">0</span> 杯</span>
      </div>
      <div class="drink-summary" id="drinkSummary"></div>
      <div class="drink-comment" id="drinkComment">シラフです（えらい）</div>
    </div>
    <div class="card">
      <div class="section-label">今夜の反省メモ</div>
      <textarea class="memo-input" id="memoInput" placeholder="例：2軒目の熱燗が敗因だった…"></textarea>
      <button class="yara-btn" onclick="recordYarakashi()">🚕 終電逃した！記録する</button>
      <button onclick="recordDone()" style="width:100%;padding:13px;font-size:15px;font-weight:500;border:0.5px solid #C0DD97;border-radius:8px;background:#EAF3DE;color:#3B6D11;cursor:pointer;margin-top:8px;">✅ 今夜を終わる</button>
    </div>
  </div>

  <div class="pane" id="pane-monthly">
    <div class="stats-grid">
      <div class="stat-card hl">
        <div class="stat-label">やらかし回数</div>
        <div class="stat-val" id="statCount">0回</div>
        <div class="stat-sub" id="statMonth"></div>
      </div>
      <div class="stat-card hl">
        <div class="stat-label">タクシー代合計</div>
        <div class="stat-val" id="statCost">¥0</div>
        <div class="stat-sub" id="statAvg"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">平均滞在時間</div>
        <div class="stat-val" id="statStay">-</div>
        <div class="stat-sub">やらかした夜の平均</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">最長滞在の夜</div>
        <div class="stat-val" id="statMaxStay">-</div>
        <div class="stat-sub" id="statMaxStayDate"></div>
      </div>
    </div>
    <div class="card">
      <div class="section-label">危険な店ランキング 🏮</div>
      <div id="shopRankList"><div class="log-empty" style="padding:1rem 0">まだデータなし</div></div>
    </div>
    <div class="card">
      <div class="section-label">種類別 飲んだ杯数</div>
      <div id="rankList"><div class="log-empty" style="padding:1rem 0">まだデータなし</div></div>
    </div>
    <div class="card">
      <div class="month-label" id="logMonthLabel"></div>
      <div id="logList"><div class="log-empty">今月はまだ記録なし（えらい！）</div></div>
    </div>
  </div>
</div>

<script>
const DRINKS=[
  {id:'beer',name:'ビール',emoji:'🍺'},
  {id:'hiball',name:'ハイボール',emoji:'🥃'},
  {id:'sour',name:'サワー',emoji:'🍋'},
  {id:'sake',name:'熱燗',emoji:'🍶'},
  {id:'shochu',name:'焼酎',emoji:'🫙'},
  {id:'wine',name:'ワイン',emoji:'🍷'},
];
const COMMENTS=["シラフです（えらい）","1杯目。まだ人間","2杯目。いい感じ〜","3杯目。もう一軒行きたい気がしてきた","4杯目。終電ヤバいかも（感知なし）","5杯目。タクシー代を計算し始めた","6杯目。記憶が飛ぶ予感","7杯以上。翌朝の自分への謝罪が必要"];
let trainMin=23*60+30,drinkCounts={beer:0,hiball:0,sour:0,sake:0,shochu:0,wine:0},checkinTime=null,selectedType=null,records=[];
try{records=JSON.parse(localStorage.getItem('yarakashi_v5')||'[]');}catch(e){}
function pad(n){return String(n).padStart(2,'0');}
function getShopHistory(){return[...new Set(records.map(r=>r.shop).filter(s=>s&&s.trim()))].slice(0,6);}
function renderShopHistory(){const h=getShopHistory();const el=document.getElementById('shopHistory');el.innerHTML=h.map(s=>`<span class="shop-chip" onclick="document.getElementById('shopInput').value='${s.replace(/'/g,"\\'")}'">📍${s}</span>`).join('');}
function switchTab(t){document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(i===0&&t==='tonight')||(i===1&&t==='monthly')));document.getElementById('pane-tonight').classList.toggle('active',t==='tonight');document.getElementById('pane-monthly').classList.toggle('active',t==='monthly');if(t==='monthly')renderMonthly();}
function setTrain(){const v=document.getElementById('trainTime').value;if(!v)return;const[h,m]=v.split(':').map(Number);trainMin=(h<5?h+24:h)*60+m;updateClock();}
function getNowMin(){const d=new Date();const h=d.getHours();return(h<5?h+24:h)*60+d.getMinutes();}
function updateClock(){const rem=trainMin-getNowMin();const cd=document.getElementById('cdNum'),msg=document.getElementById('statusMsg');const total=getTotalDrinks();if(rem<=0){cd.textContent='終電行った';cd.style.fontSize='28px';document.getElementById('cdLabel').textContent='😱';msg.className='status-msg danger';msg.textContent='終電行ったよ…タクシー代いくらかな 🚕';}else{const h=Math.floor(rem/60),m=rem%60;cd.textContent=h>0?h+'時間'+pad(m)+'分':m+'分';cd.style.fontSize=h>0?'36px':'52px';document.getElementById('cdLabel').textContent='終電まで';if(rem<=10){msg.className='status-msg danger';msg.textContent='🚨 あと'+rem+'分！今すぐ出て！！';}else if(rem<=20){msg.className='status-msg danger';msg.textContent='🚃 急いで。あと'+rem+'分しかない';}else if(rem<=40){msg.className='status-msg warn';msg.textContent='⚠️ そろそろ動いた方がいいかも（'+rem+'分)';}else{msg.className='status-msg ok';msg.textContent=total<4?'まだ大丈夫！でも飲みすぎ注意 🍺':'杯数ヤバいけど時間はまだある 🍺';}}}
function toggleCheckin(){if(!checkinTime){checkinTime=new Date();document.getElementById('checkinBtn').textContent='退店';document.getElementById('checkinBtn').classList.add('active');renderShopHistory();updateStay();}else{checkinTime=null;document.getElementById('checkinBtn').textContent='入店';document.getElementById('checkinBtn').classList.remove('active');document.getElementById('checkinStatus').textContent='チェックアウトしました';document.getElementById('stayAlert').innerHTML='';}}
function fmtStay(min){if(min<60)return min+'分';return Math.floor(min/60)+'時間'+pad(min%60)+'分';}
function updateStay(){if(!checkinTime)return;const elapsed=Math.floor((new Date()-checkinTime)/60000);const shop=document.getElementById('shopInput').value.trim();document.getElementById('checkinStatus').textContent=(shop?'📍'+shop+' で':'')+'滞在中 🍺';document.getElementById('stayTime').textContent=fmtStay(elapsed);document.getElementById('staySince').textContent=checkinTime.getHours()+':'+pad(checkinTime.getMinutes())+'から';const pct=Math.min((elapsed/180)*100,100);document.getElementById('stayBar').style.width=pct+'%';document.getElementById('stayBar').style.background=elapsed<60?'#378ADD':elapsed<120?'#BA7517':'#A32D2D';const a=document.getElementById('stayAlert');if(elapsed>=180)a.innerHTML='<div class="stay-danger-msg">3時間超え。もうほぼ終電ない時間帯では…？ 🚕</div>';else if(elapsed>=120)a.innerHTML='<div class="stay-danger-msg">2時間経過。そろそろ本気でやばい 😇</div>';else if(elapsed>=90)a.innerHTML='<div class="stay-warn-msg">1時間半。終電を意識し始めるべき時間です</div>';else if(elapsed>=60)a.innerHTML='<div class="stay-warn-msg">1時間経過。飲みすぎていませんか？ 🍺</div>';else a.innerHTML='';}
function getTotalDrinks(){return Object.values(drinkCounts).reduce((s,v)=>s+v,0);}
function renderDrinkTypes(){document.getElementById('drinkTypes').innerHTML=DRINKS.map(d=>`<div class="drink-type-btn${drinkCounts[d.id]>0?' has-drinks':''}" onclick="selectType('${d.id}')">${drinkCounts[d.id]>0?`<span class="dt-count">${drinkCounts[d.id]}</span>`:''}<span class="dt-emoji">${d.emoji}</span><span class="dt-name">${d.name}</span></div>`).join('');}
function selectType(id){selectedType=id;renderDrinkDetail();}
function renderDrinkDetail(){if(!selectedType){document.getElementById('drinkDetail').innerHTML='';return;}const d=DRINKS.find(x=>x.id===selectedType);document.getElementById('drinkDetail').innerHTML=`<div class="drink-detail"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;"><div style="font-size:13px;font-weight:500;color:#333">${d.emoji} ${d.name}</div><button class="close-btn" onclick="selectedType=null;renderDrinkDetail()">閉じる</button></div><div class="drink-ctrl"><button class="d-btn" onclick="changeDrink('${d.id}',-1)">－</button><div class="drink-ctrl-num">${drinkCounts[d.id]}<span style="font-size:14px;font-weight:400;color:#888"> 杯</span></div><button class="d-btn" onclick="changeDrink('${d.id}',1)">＋</button></div></div>`;}
function changeDrink(id,delta){drinkCounts[id]=Math.max(0,drinkCounts[id]+delta);renderDrinkTypes();renderDrinkDetail();updateDrinkSummary();}
function updateDrinkSummary(){const total=getTotalDrinks();document.getElementById('totalDrinks').textContent=total;document.getElementById('drinkComment').textContent=COMMENTS[Math.min(total,COMMENTS.length-1)];document.getElementById('drinkSummary').innerHTML=DRINKS.filter(d=>drinkCounts[d.id]>0).map(d=>`<span class="drink-tag">${d.emoji} ${d.name} ${drinkCounts[d.id]}杯</span>`).join('');}
function recordYarakashi(){const memo=document.getElementById('memoInput').value.trim();const shop=document.getElementById('shopInput').value.trim();const cost=prompt('タクシー代はいくらでしたか？（わからなければ0）','3000');if(cost===null)return;const now=new Date();const dateStr=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());const stayMin=checkinTime?Math.floor((now-checkinTime)/60000):null;const drinksSnap={...drinkCounts};const total=getTotalDrinks();const topDrink=DRINKS.filter(d=>drinksSnap[d.id]>0).sort((a,b)=>drinksSnap[b.id]-drinksSnap[a.id])[0];records.push({date:dateStr,shop:shop||'',drinks:drinksSnap,total,cost:parseInt(cost)||0,memo:memo||'メモなし',stayMin,yarakashi:true});save();const shopMsg=shop?`📍${shop}での夜でした。`:'';const drinkMsg=topDrink?`今夜の主犯は${topDrink.emoji}${topDrink.name}（${drinksSnap[topDrink.id]}杯）。`:'';alert(`記録しました😢 今月${getThisMonth().length}回目のやらかしです…\n${shopMsg}${drinkMsg}`);resetTonight();}
function recordDone(){const memo=document.getElementById('memoInput').value.trim();const shop=document.getElementById('shopInput').value.trim();const now=new Date();const dateStr=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());const stayMin=checkinTime?Math.floor((now-checkinTime)/60000):null;const drinksSnap={...drinkCounts};const total=getTotalDrinks();records.push({date:dateStr,shop:shop||'',drinks:drinksSnap,total,cost:0,memo:memo||'',stayMin,yarakashi:false});save();alert('お疲れ様でした！今夜は無事に帰れましたね✅');resetTonight();}
function resetTonight(){checkinTime=null;document.getElementById('checkinBtn').textContent='入店';document.getElementById('checkinBtn').classList.remove('active');document.getElementById('shopInput').value='';document.getElementById('stayAlert').innerHTML='';document.getElementById('checkinStatus').textContent='まだチェックインしていません';document.getElementById('memoInput').value='';drinks=0;drinkCounts={beer:0,hiball:0,sour:0,sake:0,shochu:0,wine:0};renderDrinkTypes();updateDrinkSummary();}
function save(){try{localStorage.setItem('yarakashi_v5',JSON.stringify(records));}catch(e){}}
function getThisMonth(){const now=new Date();const ym=now.getFullYear()+'-'+pad(now.getMonth()+1);return records.filter(r=>r.date.startsWith(ym));}
function renderMonthly(){const now=new Date();const label=now.getFullYear()+'年'+(now.getMonth()+1)+'月';document.getElementById('statMonth').textContent=label;document.getElementById('logMonthLabel').textContent=label+'の記録';const list=getThisMonth().sort((a,b)=>b.date.localeCompare(a.date));const totalCost=list.reduce((s,r)=>s+r.cost,0);const withStay=list.filter(r=>r.stayMin!=null);const avgStay=withStay.length>0?Math.round(withStay.reduce((s,r)=>s+r.stayMin,0)/withStay.length):null;const maxStayRec=withStay.length>0?withStay.reduce((a,b)=>a.stayMin>b.stayMin?a:b):null;document.getElementById('statCount').textContent=list.filter(r=>r.yarakashi!==false).length+'回';document.getElementById('statCost').textContent='¥'+totalCost.toLocaleString();document.getElementById('statAvg').textContent=list.length>0?'1回平均 ¥'+Math.round(totalCost/list.length).toLocaleString():'';document.getElementById('statStay').textContent=avgStay!=null?fmtStay(avgStay):'-';document.getElementById('statMaxStay').textContent=maxStayRec?fmtStay(maxStayRec.stayMin):'-';document.getElementById('statMaxStayDate').textContent=maxStayRec?maxStayRec.date.slice(5).replace('-','/')+'の夜':'';const shopCount={};list.forEach(r=>{if(r.shop){shopCount[r.shop]=(shopCount[r.shop]||0)+1;}});const shopSorted=Object.entries(shopCount).sort((a,b)=>b[1]-a[1]);const shopEl=document.getElementById('shopRankList');if(shopSorted.length===0){shopEl.innerHTML='<div class="log-empty" style="padding:1rem 0">まだデータなし</div>';}else{shopEl.innerHTML=shopSorted.map(([name,cnt],i)=>`<div class="shop-rank-item"><span style="font-size:13px;color:#aaa;min-width:20px">${i+1}</span><span class="shop-rank-name">🏮 ${name}</span><span class="shop-rank-count">${cnt}回やらかし</span>${i===0&&cnt>1?'<span class="shop-rank-badge">要注意</span>':''}</div>`).join('');}const totals={};DRINKS.forEach(d=>totals[d.id]=0);list.forEach(r=>{if(r.drinks)DRINKS.forEach(d=>totals[d.id]+=(r.drinks[d.id]||0));});const maxT=Math.max(...Object.values(totals),1);const sorted=DRINKS.filter(d=>totals[d.id]>0).sort((a,b)=>totals[b.id]-totals[a.id]);const rankEl=document.getElementById('rankList');if(sorted.length===0){rankEl.innerHTML='<div class="log-empty" style="padding:1rem 0">まだデータなし</div>';}else{rankEl.innerHTML=sorted.map(d=>`<div class="rank-item"><span class="rank-emoji">${d.emoji}</span><span class="rank-name">${d.name}</span><div class="rank-bar-wrap"><div class="rank-bar" style="width:${Math.round((totals[d.id]/maxT)*100)}%"></div></div><span class="rank-count">${totals[d.id]}杯</span></div>`).join('');}const logEl=document.getElementById('logList');if(list.length===0){logEl.innerHTML='<div class="log-empty">今月はまだ記録なし（えらい！）</div>';return;}logEl.innerHTML=list.map((r,i)=>{const tags=r.drinks?DRINKS.filter(d=>r.drinks[d.id]>0).map(d=>`<span class="log-tag">${d.emoji}${d.name} ${r.drinks[d.id]}</span>`).join(''):'';return`<div class="log-item"><div><div class="log-date">${r.date.slice(5).replace('-','/')} ${r.yarakashi===false?'<span style="font-size:11px;background:#EAF3DE;color:#3B6D11;padding:2px 7px;border-radius:20px;display:inline-block;">無事帰還</span>':'<span class="log-yara">やらかし</span>'}</div>${r.shop?`<div class="log-shop">🏮 ${r.shop}</div>`:''}<div class="log-memo">${r.memo}</div><div class="log-tags">${tags}</div></div><div class="log-right"><div class="log-cups">合計 ${r.total||0}杯</div>${r.stayMin!=null?'<div class="log-stay">🕐 '+fmtStay(r.stayMin)+'</div>':''}${r.yarakashi!==false?'<div class="log-cost">¥'+r.cost.toLocaleString()+'</div>':''}<button class="del-btn" onclick="deleteRec(${i})">削除</button></div></div>`;}).join('');}
function deleteRec(i){const list=getThisMonth().sort((a,b)=>b.date.localeCompare(a.date));const idx=records.indexOf(list[i]);if(!confirm('この記録を削除しますか？'))return;if(idx>=0){records.splice(idx,1);save();renderMonthly();}}
renderDrinkTypes();renderShopHistory();
setInterval(()=>{updateClock();updateStay();},10000);
updateClock();
</script>
